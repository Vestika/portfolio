name: Tests
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports: [27017:27017]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        working-directory: backend
        run: poetry install
      - name: Run tests
        working-directory: backend
        run: poetry run pytest tests/ -v --tb=short -x -m "not slow"
        env:
          MONGODB_URL: mongodb://localhost:27017
          MONGODB_DATABASE: vestika_test
